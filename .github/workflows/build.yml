name: Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test shared
        run: ./gradlew :shared:allTests

      - name: Build & test agent
        run: ./gradlew :agent:build

      - name: Compile frontend (type-check)
        run: ./gradlew :frontend:compileProductionExecutableKotlinWasmJs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
